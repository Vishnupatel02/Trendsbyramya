<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" width="100%" height="100%">
  <defs>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap");
      .serif-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 900;
        fill: #8B2332;
        letter-spacing: 0.05em;
      }
      .serif-by {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic;
        font-weight: 600;
        fill: #8B2332;
      }
      .cursive-name {
        font-family: 'Great Vibes', cursive;
        fill: #8B2332;
      }
    </style>
  </defs>

  <!-- Gown Hanger -->
  <path d="M 135,102 C 135,85 147,85 147,75 C 147,65 135,65 135,75" stroke="#8B2332" stroke-width="2.5" stroke-linecap="round" fill="none" />
  <path d="M 100,112 L 135,100 L 170,112" stroke="#8B2332" stroke-width="2.5" stroke-linecap="round" fill="none" />

  <!-- Left Arm (on hip) -->
  <path d="M 100,112 C 82,125 78,145 80,152 C 82,158 92,165 102,168" stroke="#8B2332" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8" />

  <!-- Right Arm (holding drape) -->
  <path d="M 170,112 C 190,118 210,132 232,138 C 236,139 245,138 245,135 C 245,132 232,126 220,120" stroke="#8B2332" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8" />

  <!-- Gown Silhouette -->
  <path d="M 118,112
           L 115,145
           C 115,160 122,175 122,190
           C 122,190 62,280 25,370
           C 10,405 52,415 135,405
           C 218,415 260,405 245,370
           C 208,280 148,190 148,190
           C 148,175 155,160 155,145
           L 152,112
           Z" 
        fill="#8B2332" />

  <!-- Skirt drapery folds for depth -->
  <path d="M 122,190 C 122,220 95,300 75,405" stroke="#F8F6F1" stroke-width="1.5" fill="none" opacity="0.25" />
  <path d="M 135,190 C 135,220 135,300 135,405" stroke="#F8F6F1" stroke-width="1.5" fill="none" opacity="0.25" />
  <path d="M 148,190 C 148,220 175,300 195,405" stroke="#F8F6F1" stroke-width="1.5" fill="none" opacity="0.25" />

  <!-- Dupatta/Drape Fabric -->
  <path d="M 122,190 
           C 110,225 118,260 170,270 
           C 200,275 220,240 234,138 
           C 234,138 260,240 280,310 
           C 288,338 278,348 262,342 
           C 245,335 228,265 218,185 
           C 240,240 215,295 190,295 
           C 165,295 155,235 122,190 
           Z" 
        fill="#8B2332" opacity="0.9" />

  <!-- Typography matching logo -->
  <!-- "TRENDS" -->
  <text x="260" y="210" class="serif-title" font-size="64">TRENDS</text>
  
  <!-- "By" -->
  <text x="455" y="235" class="serif-by" font-size="28">By</text>
  
  <!-- "Ramya" -->
  <text x="285" y="320" class="cursive-name" font-size="110">Ramya</text>
</svg>
